# render.yaml - Render Blueprint
# Deploy to Render.com (Free Tier: 750 hours/month)
#
# Setup:
# 1. Push agent to GitHub
# 2. Go to render.com > New > Blueprint
# 3. Connect your GitHub repo
# 4. Render auto-detects this file

services:
  - type: web
    name: cs-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # ── Tenant ──────────────────────────────────────────
      - key: TENANT_NAME
        sync: false

      # ── LLM (primary + fallback) ────────────────────────
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FALLBACK_MODEL
        value: claude-haiku-4-5-20251001

      # ── Shopify ─────────────────────────────────────────
      - key: SHOPIFY_SHOP_DOMAIN
        sync: false
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false

      # ── Gorgias ─────────────────────────────────────────
      - key: GORGIAS_DOMAIN
        sync: false
      - key: GORGIAS_EMAIL
        sync: false
      - key: GORGIAS_API_KEY
        sync: false
      - key: GORGIAS_WEBHOOK_SECRET
        sync: false

      # ── Automation policy ───────────────────────────────
      - key: AUTO_SEND_ENABLED
        value: "false"
      - key: AUTO_SEND_MIN_CONFIDENCE
        value: "0.85"
      - key: AUTO_SEND_BLOCKED_CATEGORIES
        value: "refund,complaint,legal,other"

      # ── Storage ─────────────────────────────────────────
      - key: DB_PATH
        value: cs_agent.db
      - key: ENV
        value: production

      # ── API Security ────────────────────────────────────
      - key: API_KEY
        sync: false
      - key: REQUIRE_API_KEY
        value: "true"
      - key: ALLOWED_ORIGINS
        value: ""
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: REFUND_RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: RESEND_RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: INBOUND_WEBHOOK_SECRET
        sync: false

      # ── Cost governance ───────────────────────────────────
      - key: DAILY_COST_CAP_USD
        value: "5.0"

      # ── Python runtime (Render only, not in .env.example) ──
      - key: PYTHON_VERSION
        value: "3.12.0"
